name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: dotnet restore Agentry.slnx
      - run: dotnet build Agentry.slnx --no-restore -c Release
      - run: dotnet test Agentry.slnx --no-build -c Release
